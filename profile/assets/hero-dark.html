  <title>AKA Security</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    .hero { position: relative; width: 1280px; height: 400px; overflow: hidden; background: #161E27; color: #F6F8F9; }
    .grid { position: absolute; inset: 0; opacity: .14; background-image: radial-gradient(circle, #F6F8F9 1px, transparent 1.1px); background-size: 22px 22px; }
    .content { position: relative; z-index: 1; padding: 64px; }
    .lockup { display: flex; height: 34px; align-items: center; gap: 14px; }
    .mark { width: auto; height: 34px; display: block; }
    .wordmark { width: auto; height: 22px; display: block; }
    .copy { margin-top: 40px; }
    .eyebrow { margin: 0; color: #00E0B8; font: 400 13px/1 "Geist Mono", monospace; letter-spacing: .12em; }
    h1 { max-width: 660px; margin: 18px 0 0; font: 300 52px/1.05 "Hanken Grotesk", sans-serif; letter-spacing: -.02em; }
    .motif { position: absolute; z-index: 1; right: 84px; top: 50%; width: 240px; height: 240px; transform: translateY(-50%); }
    .disc { position: absolute; right: 0; bottom: 0; width: 200px; height: 200px; border-radius: 50%; background: #00E0B8; }
    .ring { position: absolute; left: 0; top: 0; width: 160px; height: 160px; border: 3px solid rgb(246 248 249 / 16%); border-radius: 50%; }
  </style>
</head>
