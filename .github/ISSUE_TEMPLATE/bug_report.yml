name: Bug report
description: Report a defect
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands, inputs, and environment.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit SHA.
    validations:
      required: false
